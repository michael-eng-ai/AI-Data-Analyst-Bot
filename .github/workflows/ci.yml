name: Python Application CI and Terraform Plan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  python-lint-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with Ruff
      run: |
        ruff check src/

  terraform-plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure
    steps:
    - uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
    - name: Terraform Init
      run: terraform init
    - name: Terraform Format
      run: terraform fmt -check
    
    # Mock GCP credentials for Terraform Plan in CI
    - name: Create Mock GCP Credentials
      run: |
        echo '{"type": "service_account", "project_id": "fake-project-id", "private_key_id": "mock", "private_key": "-----BEGIN PRIVATE KEY-----\nMOCK\n-----END PRIVATE KEY-----\n", "client_email": "mock@fake-project-id.iam.gserviceaccount.com", "client_id": "mock", "auth_uri": "https://accounts.google.com/o/oauth2/auth", "token_uri": "https://oauth2.googleapis.com/token", "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs", "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/mock%40fake-project-id.iam.gserviceaccount.com"}' > ${{ github.workspace }}/gcp-credentials.json
    
    - name: Terraform Plan
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-credentials.json
      run: terraform plan -var="project_id=fake-project-id" -no-color
